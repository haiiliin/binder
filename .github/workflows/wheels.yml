name: Wheels

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/wheels.yml"
      - "python/**"
      - "source/**"
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/wheels.yml"
      - "python/**"
      - "source/**"
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: wheels-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os:
          - ubuntu-latest
        archs:
          - "x86_64"
          - "i686"
        impl:
          - "manylinux"
          - "musllinux"
        include:
          - os: windows-latest
            archs: "AMD64"
            impl: win
          - os: windows-latest
            archs: "x86"
            impl: win
          - os: macos-15-intel
            archs: "universal2"
            impl: macosx
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup QEMU for Linux cross-compilation
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Clone LLVM project
        shell: bash
        run: |
          git clone -b release/6.x https://github.com/llvm/llvm-project.git
        working-directory: python

      - name: Setup LLVM project
        shell: bash
        run: |
          echo 'add_subdirectory(binder)' > python/llvm-project/clang-tools-extra/CMakeLists.txt
          cp -r source python/llvm-project/clang-tools-extra/binder
          if [[ "$(uname)" == "Darwin" ]]; then
            python3 << 'EOF'
          import sys
          path = 'python/llvm-project/llvm/lib/Support/Regex.cpp'
          if not __import__('os').path.exists(path):
              print(f'WARNING: {path} not found, skipping patch', file=sys.stderr)
              sys.exit(0)
          with open(path) as f:
              content = f.read()
          # On macOS 15+ SDK, xlocale/_regex.h is pulled in transitively via newer libc++ headers
          # before LLVM's regex_impl.h defines regex_t, causing a compilation error.
          # Fix: include regex_impl.h before the LLVM ADT includes so regex_t is defined first.
          patch = '#ifdef __APPLE__\nextern "C" {\n#include "regex_impl.h"\n}\n#endif\n'
          target = '#include "llvm/ADT/StringRef.h"'
          if patch not in content:
              if target not in content:
                  print(f'WARNING: target string not found in {path}, skipping patch', file=sys.stderr)
                  sys.exit(0)
              content = content.replace(target, patch + target, 1)
              with open(path, 'w') as f:
                  f.write(content)
          EOF
          fi

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_BUILD: cp313-${{ matrix.impl }}*
          CIBW_ARCHS: ${{ matrix.archs }}
        with:
          package-dir: python

      - name: Upload wheels to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cppbinder-wheels-${{ matrix.os }}-${{ matrix.archs }}-${{ matrix.impl }}-${{ github.event_name == 'release' && github.ref_name || github.sha }}
          path: ./wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clone LLVM project
        shell: bash
        run: |
          git clone -b release/6.x https://github.com/llvm/llvm-project.git
        working-directory: python

      - name: Setup LLVM project
        shell: bash
        run: |
          echo 'add_subdirectory(binder)' > python/llvm-project/clang-tools-extra/CMakeLists.txt
          cp -r source python/llvm-project/clang-tools-extra/binder

      - name: Setup build and build source distribution
        run: |
          pipx install build
          pipx run build --sdist --outdir dist
        working-directory: python

      - name: Upload source distribution to artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cppbinder-sdist-${{ github.event_name == 'release' && github.ref_name || github.sha }}
          path: ./python/dist/*.tar.gz

  publish:
    needs: [build-wheels, build-sdist]
    if: github.event_name == 'release'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download wheels and source distribution
        uses: actions/download-artifact@v8
        with:
          pattern: cppbinder-*
          path: dist
          merge-multiple: true

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@v1.8.14
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist
